name: iOS Build & Test

on:
  push:
    branches: [main]
    paths: ['ios/**']
  pull_request:
    branches: [main]
    paths: ['ios/**']

jobs:
  build:
    runs-on: macos-14
    defaults:
      run:
        working-directory: ios/COHRM

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 15
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Resolve Swift packages
        run: xcodebuild -resolvePackageDependencies -project COHRM.xcodeproj -scheme COHRM

      - name: Run tests
        run: |
          xcodebuild test \
            -project COHRM.xcodeproj \
            -scheme COHRM \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=17.5' \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGNING_ALLOWED=NO

      - name: Build archive
        run: |
          xcodebuild archive \
            -project COHRM.xcodeproj \
            -scheme COHRM \
            -archivePath build/COHRM.xcarchive \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            SKIP_INSTALL=NO

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-test-results
          path: ios/COHRM/TestResults.xcresult
