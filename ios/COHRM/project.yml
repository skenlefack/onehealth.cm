# project.yml
# COHRM Cameroun - XcodeGen project configuration
#
# Generate the Xcode project with:
#   brew install xcodegen  (if not installed)
#   cd ios/COHRM && xcodegen generate
#
# This will create COHRM.xcodeproj ready for building.

name: COHRM
options:
  bundleIdPrefix: cm.onehealth.cohrm
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true
  defaultConfig: Release
  groupSortPosition: top

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: 1
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"
    INFOPLIST_KEY_CFBundleDisplayName: "COHRM"
    INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.healthcare-fitness"
    CODE_SIGN_STYLE: Automatic

targets:
  COHRM:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: COHRM
        excludes:
          - "**/*.md"
    resources:
      - path: COHRM/Resources
        optional: true
      - path: PrivacyInfo.xcprivacy
    settings:
      base:
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "COHRM utilise votre position pour localiser les signalements sanitaires."
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "COHRM utilise vos photos pour documenter les signalements sanitaires."
        INFOPLIST_KEY_NSCameraUsageDescription: "COHRM utilise l'appareil photo pour documenter les signalements sanitaires."
        INFOPLIST_KEY_BGTaskSchedulerPermittedIdentifiers: "$(PRODUCT_BUNDLE_IDENTIFIER).sync"
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    entitlements:
      path: COHRM/COHRM.entitlements
      properties:
        com.apple.developer.associated-domains: []
        com.apple.backgroundtaskscheduler: true
    scheme:
      testTargets:
        - COHRMTests
      gatherCoverageData: true

  COHRMTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ../COHRMTests
    dependencies:
      - target: COHRM
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/COHRM.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/COHRM"
        BUNDLE_LOADER: "$(TEST_HOST)"

schemes:
  COHRM:
    build:
      targets:
        COHRM: all
        COHRMTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      gatherCoverageData: true
      targets:
        - COHRMTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
